{% extends "!layout.html" %}

{% block breadcrumbs %}
  {{ super() }}
  <div style="float: right; margin-top: -30px;">
    {% if language == 'en' %}
      <a href="../nl/{{ pagename }}.html" class="btn btn-neutral" style="background-color: #d4a96a; color: white; border: none;">
        <i class="fa fa-language"></i> Bekijk in het Nederlands
      </a>
    {% elif language == 'nl' %}
      <a href="../en/{{ pagename }}.html" class="btn btn-neutral" style="background-color: #1a2a6b; color: white; border: none;">
        <i class="fa fa-language"></i> View in English
      </a>
    {% endif %}
  </div>
{% endblock %}
